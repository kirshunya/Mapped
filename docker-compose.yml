services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: mapped-postgres
    environment:
      POSTGRES_USER: mapsocial
      POSTGRES_PASSWORD: mapsocial123
      POSTGRES_DB: mapsocial
    # Removed ports for Railway - services communicate via container network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapsocial"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mapped-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mapped-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mapped-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mapped-kafka
    # Removed ports - only used internally
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'test' | nc localhost 29092"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - mapped-network

  minio:
    image: minio/minio:latest
    container_name: mapped-minio
    # Removed ports for Railway
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - mapped-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    # Removed ports - only used internally via gateway
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
      - JWT_SECRET=mapsocial-super-secret-key-2024
      - JWT_EXPIRY=720h
      - KAFKA_BROKER=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - mapped-network

  places-service:
    build:
      context: ./services/places-service
      dockerfile: Dockerfile
    container_name: places-service
    # Removed ports - only used internally
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - mapped-network

  reviews-service:
    build:
      context: ./services/reviews-service
      dockerfile: Dockerfile
    container_name: reviews-service
    # Removed ports - only used internally
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - mapped-network

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    container_name: media-service
    # Removed ports - only used internally
    environment:
      - MEDIA_STORAGE_PATH=/app/storage
      - MEDIA_PUBLIC_URL=http://localhost:8080/media
    volumes:
      - media_data:/app/storage
    restart: on-failure
    networks:
      - mapped-network

  posts-service:
    build:
      context: ./services/posts-service
      dockerfile: Dockerfile
    container_name: posts-service
    # Removed ports - only used internally
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=mapsocial
      - DB_PASSWORD=mapsocial123
      - DB_NAME=mapsocial
      - PORT=8085
      - KAFKA_BROKER=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - mapped-network

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    # Removed ports - only used internally
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
      - PORT=8086
      - KAFKA_BROKER=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - mapped-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=mapsocial-super-secret-key-2024
      - PORT=8080
    depends_on:
      - auth-service
      - places-service
      - reviews-service
      - posts-service
      - chat-service
      - media-service
    restart: on-failure
    networks:
      - mapped-network

volumes:
  postgres_data:
  minio_data:
  media_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  mapped-network:
    driver: bridge
