services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: mapsocial
      POSTGRES_PASSWORD: mapsocial123
      POSTGRES_DB: mapsocial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapsocial"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'test' | nc localhost 29092"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
      - JWT_SECRET=mapsocial-super-secret-key-2024
      - JWT_EXPIRY=720h
      - KAFKA_BROKER=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  places-service:
    build:
      context: ./services/places-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  reviews-service:
    build:
      context: ./services/reviews-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - MEDIA_STORAGE_PATH=/app/storage
      - MEDIA_PUBLIC_URL=http://localhost:8080/media
    volumes:
      - media_data:/app/storage
    restart: on-failure

  posts-service:
    build:
      context: ./services/posts-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=mapsocial
      - DB_PASSWORD=mapsocial123
      - DB_NAME=mapsocial
      - PORT=8085
      - KAFKA_BROKER=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      - DATABASE_URL=host=postgres user=mapsocial password=mapsocial123 dbname=mapsocial port=5432 sslmode=disable
      - PORT=8086
      - KAFKA_BROKER=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=mapsocial-super-secret-key-2024
    restart: on-failure

  web:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - gateway
    restart: on-failure

volumes:
  postgres_data:
  minio_data:
  media_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
